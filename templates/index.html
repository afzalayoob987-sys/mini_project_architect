<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arc-3D | Immersive 3D Generator</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body {
            /* Stunning Modern House Exterior Background */
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), 
                        url('https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&q=80&w=2070') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            color: #fff;
        }

        .glass-card {
            /* Premium Glassmorphism UI */
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4); /* Thicker white border for premium look */
            border-radius: 20px;
            padding: 50px 40px;
            max-width: 850px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 40px 0 rgba(0, 0, 0, 0.5);
            animation: fadeIn 1.2s ease-out;
        }

        h1 {
            font-weight: 800;
            font-size: 3.5rem;
            letter-spacing: -0.05em;
            margin-bottom: 15px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .subtitle {
            font-weight: 300;
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.85);
            margin-bottom: 45px;
            letter-spacing: 0.02em;
        }

        .button-group {
            display: flex;
            gap: 25px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .glass-button {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 30px 40px;
            width: 300px;
            color: #fff;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .glass-button:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.6);
            filter: brightness(1.3); /* Smooth brightness increase */
            transform: translateY(-8px) scale(1.02);
            color: #fff;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
        }

        .button-title {
            font-weight: 700;
            font-size: 1.4rem;
        }

        .button-subtitle {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            .glass-button { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="glass-card">
        <h1>Immersive 3D Generator</h1>
        <p class="subtitle">State-of-the-art architectural modeling for professionals and clients.</p>
        
        <div class="button-group">
            <a href="/architect" class="glass-button">
                <svg width="36" height="36" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2v16z"/></svg>
                <span class="button-title">I am an Architect</span>
                <span class="button-subtitle">Scan & Generate 3D Models</span>
            </a>

            <a href="/client" class="glass-button">
                <svg width="36" height="36" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                <span class="button-title">I am a Client</span>
                <span class="button-subtitle">View & Feedback Your Model</span>
            </a>
        </div>

        <div class="mt-5 pt-4 border-top border-white border-opacity-10 opacity-50 small">
            © 2026 Arc-3D Prototyping | Immersive Design Studio
        </div>
    </div>
</body>
</html>
